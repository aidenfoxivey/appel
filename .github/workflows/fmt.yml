name: Format

on:
  push:
  pull_request:

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: "5"
          dune-cache: true
      - run: opam install . --deps-only --with-test
      - run: opam exec -- dune build @fmt
